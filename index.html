  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha: false });
  ctx.imageSmoothingEnabled = false;

  const W = 288, H = 512;
  const GROUND_Y = 400;
  const BASE_H = 112;
  const PIPE_W = 52;
  const PIPE_H = 320;
  const GAP = 100;
  const PIPE_INTERVAL = 100;
  const PIPE_SPEED = 2;
  const GRAVITY = 0.25;
  const FLAP = -4.6;
  const MAX_DROP = 8;
  const BIRD_X = 57;
  const BIRD_W = 34, BIRD_H = 24;

  const imgs = {};
  let loaded = 0;
  const keys = Object.keys(ASSET_SRC);
  for (const k of keys) {
    const im = new Image();
    im.onload = () => { loaded++; };
    im.src = ASSET_SRC[k];
    imgs[k] = im;
  }

  let DPR = 1, scale = 1;
  function resize() {
    DPR = Math.min(3, window.devicePixelRatio || 1);
    const ww = Math.max(1, window.innerWidth);
    const hh = Math.max(1, window.innerHeight);
    scale = Math.min(ww / W, hh / H);
    canvas.style.width = Math.floor(W * scale) + "px";
    canvas.style.height = Math.floor(H * scale) + "px";
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.imageSmoothingEnabled = false;
  }
  addEventListener("resize", resize, { passive: true });
  addEventListener("orientationchange", () => setTimeout(resize, 120), { passive: true });
  resize();

  const State = { READY: 0, PLAY: 1, HIT: 2, OVER: 3 };
  let state, frames, baseX, birdY, birdV, birdRot, flapFrame, pipes, score, best, flash, showNight;

  best = Number(localStorage.getItem("flappy_best") || 0);
  showNight = false;

  function reset() {
    state = State.READY;
    frames = 0;
    baseX = 0;
    birdY = 226;
    birdV = 0;
    birdRot = 0;
    flapFrame = 0;
    pipes = [];
    score = 0;
    flash = 0;
  }
  reset();

  // deterministic-ish original-feeling random gap placement
  function addPipe() {
    const minTopBottom = 52;
    const gapY = Math.floor(120 + Math.random() * 180);
    const topY = gapY - GAP / 2 - PIPE_H;
    const bottomY = gapY + GAP / 2;
    pipes.push({ x: W + 10, topY, bottomY, passed: false });
  }

  function flap() {
    if (state === State.READY) {
      state = State.PLAY;
      birdV = FLAP;
    } else if (state === State.PLAY) {
      birdV = FLAP;
    } else if (state === State.OVER) {
      reset();
    }
  }

  function pointer(e) {
    e.preventDefault();
    flap();
  }

  canvas.addEventListener("pointerdown", pointer, { passive: false });
  canvas.addEventListener("touchstart", pointer, { passive: false });
  addEventListener("keydown", e => {
    if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyX") {
      e.preventDefault();
      flap();
    }
  });

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function birdBox() {
    // slightly forgiving central hitbox, matching the feel of the original.
    return { x: BIRD_X + 6, y: birdY + 4, w: 23, h: 17 };
  }

  function update() {
    frames++;
    if (state !== State.OVER && state !== State.HIT) baseX = (baseX - PIPE_SPEED) % 48;

    if (state === State.READY) {
      birdY = 226 + Math.sin(frames / 10) * 5;
      flapFrame = Math.floor(frames / 8) % 3;
      birdRot = 0;
      return;
    }

    if (state === State.PLAY) {
      if (frames % PIPE_INTERVAL === 0) addPipe();

      birdV = Math.min(MAX_DROP, birdV + GRAVITY);
      birdY += birdV;
      birdRot = birdV < 0 ? -0.35 : Math.min(1.45, birdRot + 0.045);
      flapFrame = Math.floor(frames / 5) % 3;

      for (const p of pipes) {
        p.x -= PIPE_SPEED;
        if (!p.passed && p.x + PIPE_W < BIRD_X) {
          p.passed = true;
          score++;
          if (score > best) {
            best = score;
            localStorage.setItem("flappy_best", String(best));
          }
        }
      }
      pipes = pipes.filter(p => p.x > -PIPE_W - 5);

      const b = birdBox();
      if (birdY + BIRD_H >= GROUND_Y || birdY < -20) {
        state = State.HIT;
        flash = 5;
      }
      for (const p of pipes) {
        const top = { x: p.x, y: p.topY, w: PIPE_W, h: PIPE_H };
        const bottom = { x: p.x, y: p.bottomY, w: PIPE_W, h: PIPE_H };
        if (rectsOverlap(b, top) || rectsOverlap(b, bottom)) {
          state = State.HIT;
          flash = 5;
          break;
        }
      }
    } else if (state === State.HIT) {
      birdV = Math.min(MAX_DROP, birdV + GRAVITY);
      birdY += birdV;
      birdRot = Math.min(1.55, birdRot + 0.09);
      if (birdY + BIRD_H >= GROUND_Y) {
        birdY = GROUND_Y - BIRD_H;
        state = State.OVER;
      }
    }
  }

  function drawTiled(img, x, y, w, h) {
    for (let xx = x; xx < W; xx += img.width) ctx.drawImage(img, xx, y, img.width, img.height);
  }

  function drawBackground() {
    const bg = imgs[showNight ? "background-night.png" : "background-day.png"];
    for (let x = 0; x < W; x += bg.width) {
      ctx.drawImage(bg, x, 0);
    }
  }

  function drawPipes() {
    const pipe = imgs[showNight ? "pipe-red.png" : "pipe-green.png"];
    for (const p of pipes) {
      ctx.save();
      ctx.translate(p.x + PIPE_W / 2, p.topY + PIPE_H / 2);
      ctx.rotate(Math.PI);
      ctx.drawImage(pipe, -PIPE_W / 2, -PIPE_H / 2);
      ctx.restore();
      ctx.drawImage(pipe, p.x, p.bottomY);
    }
  }

  function drawBase() {
    const base = imgs["base.png"];
    for (let x = baseX - 48; x < W + 48; x += base.width) {
      ctx.drawImage(base, x, GROUND_Y);
    }
  }

  function drawBird() {
    const birdImgs = [
      imgs["yellowbird-upflap.png"],
      imgs["yellowbird-midflap.png"],
      imgs["yellowbird-downflap.png"]
    ];
    const im = birdImgs[flapFrame];
    ctx.save();
    ctx.translate(BIRD_X + BIRD_W / 2, birdY + BIRD_H / 2);
    ctx.rotate(birdRot);
    ctx.drawImage(im, -BIRD_W / 2, -BIRD_H / 2);
    ctx.restore();
  }

  function drawNumber(value, y, size = "large") {
    const str = String(value);
    const digits = str.split("").map(d => imgs[d + ".png"]);
    const gap = -1;
    const widths = digits.map(d => d.width);
    const total = widths.reduce((a,b)=>a+b,0) + gap * (digits.length - 1);
    let x = Math.floor((W - total) / 2);
    for (const d of digits) {
      ctx.drawImage(d, x, y);
      x += d.width + gap;
    }
  }

  function drawSmallNumber(value, x, y) {
    // Use same sprite digits, scaled down for score card.
    const str = String(value);
    let total = 0;
    for (const ch of str) total += imgs[ch + ".png"].width * 0.5;
    let xx = x - total;
    for (const ch of str) {
      const d = imgs[ch + ".png"];
      ctx.drawImage(d, xx, y, d.width * 0.5, d.height * 0.5);
      xx += d.width * 0.5;
    }
  }

  function drawReady() {
    const msg = imgs["message.png"];
    ctx.drawImage(msg, Math.floor((W - msg.width) / 2), 75);
  }

  function drawScoreCard() {
    // hand-drawn score panel to avoid needing non-packed scoreboard sprite
    const x = 24, y = 230, w = 240, h = 126;
    ctx.fillStyle = "#ded895";
    ctx.strokeStyle = "#543847";
    ctx.lineWidth = 2;
    roundRect(x, y, w, h, 8, true, true);
    ctx.fillStyle = "#fff3be";
    roundRect(x + 8, y + 8, w - 16, h - 16, 5, true, false);

    ctx.fillStyle = "#de7b39";
    ctx.font = "bold 15px Arial, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText("SCORE", x + w - 22, y + 36);
    ctx.fillText("BEST", x + w - 22, y + 78);

    drawSmallNumber(score, x + w - 24, y + 43);
    drawSmallNumber(best, x + w - 24, y + 85);

    let medal = null;
    if (score >= 40) medal = "#f3d34a";
    else if (score >= 30) medal = "#d7d7d7";
    else if (score >= 20) medal = "#c77743";
    else if (score >= 10) medal = "#9b6e45";
    if (medal) {
      ctx.beginPath();
      ctx.arc(x + 55, y + 62, 22, 0, Math.PI * 2);
      ctx.fillStyle = medal;
      ctx.fill();
      ctx.strokeStyle = "#fff8c6";
      ctx.lineWidth = 3;
      ctx.stroke();
    }
  }

  function roundRect(x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
    if(fill) ctx.fill();
    if(stroke) ctx.stroke();
  }

  function drawOver() {
    const go = imgs["gameover.png"];
    ctx.drawImage(go, Math.floor((W - go.width) / 2), 150);
    drawScoreCard();
    ctx.fillStyle = "rgba(0,0,0,.32)";
    ctx.font = "bold 13px Arial, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("TAP TO RESTART", W / 2, 390);
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawPipes();
    drawBase();
    drawBird();

    if (state === State.READY) drawReady();
    if (state === State.PLAY || state === State.HIT) drawNumber(score, 30);
    if (state === State.OVER) drawOver();

    if (flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flash / 8})`;
      ctx.fillRect(0, 0, W, H);
      flash--;
    }
  }

  function loop() {
    if (loaded === keys.length) {
      update();
      render();
    } else {
      ctx.fillStyle = "#70c5ce";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.font = "16px sans-serif";
      ctx.fillText("Loading...", W / 2, H / 2);
    }
    requestAnimationFrame(loop);
  }
  loop();

  // Prevent iOS rubber-band/gesture interference.
  document.addEventListener("gesturestart", e => e.preventDefault());
  document.addEventListener("touchmove", e => e.preventDefault(), { passive: false });
})();
</script>
</body>
</html>
